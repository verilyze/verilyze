---
# Scheduled Renovate: Dockerfile, super-linter digest (regex), rust-toolchain.toml
# channel (regex + rust-lang/rust tags), GitHub Actions (commit SHA + tag comment;
# minor/patch grouped in one PR). See renovate.json.
# Uses a GitHub App installation token (short-lived), not a user PAT.

name: Renovate

on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Create installation token for Renovate
        id: renovate-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}  # zizmor: ignore[secrets-outside-env]
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}  # zizmor: ignore[secrets-outside-env]

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: renovatebot/github-action@b67590ea780158ccd13192c22a3655a5231f869d # v46.1.8
        with:
          configurationFile: renovate.json
          token: ${{ steps.renovate-token.outputs.token }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
