---
# Scheduled Renovate: twice weekly (Mon/Thu 05:00 UTC). Dockerfile, super-linter
# digest (regex), rust-toolchain.toml channel (regex + rust-lang/rust tags),
# GitHub Actions (commit SHA + tag comment; minor/patch grouped in one PR).
# See renovate.json. Uses a GitHub App installation token (short-lived), not PAT.

name: Renovate

on:
  schedule:
    - cron: "0 5 * * 1"
    - cron: "0 5 * * 4"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Create installation token for Renovate
        id: renovate-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}  # zizmor: ignore[secrets-outside-env]
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}  # zizmor: ignore[secrets-outside-env]

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: renovatebot/github-action@eb932558ad942cccfd8211cf535f17ff183a9f74 # v46.1.9
        with:
          configurationFile: renovate.json
          token: ${{ steps.renovate-token.outputs.token }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
