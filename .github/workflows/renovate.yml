---
# Scheduled Renovate: twice weekly (Mon/Thu 05:00 UTC). Cargo workspace deps,
# Dockerfile, super-linter digest (regex), rust-toolchain.toml channel (regex +
# rust-lang/rust tags), GitHub Actions (commit SHA + tag comment; minor/patch
# grouped in one PR). Post-upgrade: THIRD-PARTY-LICENSES via
# scripts/renovate-post-upgrade-licenses.sh (requires RENOVATE_ALLOWED_COMMANDS).
# Job runs on ubuntu-latest; Renovate executes inside its container image.
# See renovate.json. Uses a GitHub App installation token (short-lived), not PAT.

name: Renovate

on:
  schedule:
    - cron: "0 5 * * 1"
    - cron: "0 5 * * 4"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Create installation token for Renovate
        id: renovate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.RENOVATE_APP_CLIENT_ID }}  # zizmor: ignore[secrets-outside-env]
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}  # zizmor: ignore[secrets-outside-env]
          repositories: ${{ github.repository }}
          # Least-privilege token; mirrors Renovate GitHub App perms in CONTRIBUTING.
          permission-administration: read
          permission-checks: write
          permission-contents: write
          permission-issues: write
          permission-members: read
          permission-metadata: read
          permission-pull-requests: write
          permission-statuses: write
          permission-vulnerability-alerts: read
          permission-workflows: write

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: renovatebot/github-action@8217b3fc286df088d7c27f3255fe8414463bc0fd # v46.1.15
        with:
          configurationFile: renovate.json
          token: ${{ steps.renovate-token.outputs.token }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          # postUpgradeTasks (THIRD-PARTY-LICENSES); global-only in Renovate
          RENOVATE_ALLOWED_COMMANDS: '["^bash scripts/renovate-post-upgrade-licenses\\.sh$"]'
