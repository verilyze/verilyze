---
# OpenSSF Scorecard for PRs that change workflows (Token-Permissions, etc.).
# publish_results: false avoids Code Scanning / badge requirements on PRs.

name: Scorecard workflows PR

on:
  pull_request:
    paths:
      - ".github/workflows/**"

permissions: {}

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: false
