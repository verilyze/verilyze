---
# OpenSSF Scorecard for PRs that change workflows (Token-Permissions, etc.).
# publish_results: false avoids Code Scanning / badge requirements on PRs.

name: Scorecard workflows PR

on:
  pull_request:
    paths:
      - ".github/workflows/**"

permissions: {}

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: false
