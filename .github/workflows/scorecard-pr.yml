---
# OpenSSF Scorecard for PRs that change workflows (Token-Permissions, etc.).
# publish_results: false avoids Code Scanning / badge requirements on PRs.

name: Scorecard workflows PR

on:
  pull_request:
    paths:
      - ".github/workflows/**"

permissions: {}

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@2d1146689b8cda280b9bc96326124645441f03bc # v2.4.4
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: false
