---
# Supply-chain trust checks: workspace SBOM freshness (SEC-019) and verilyze
# self-scan with live CVE lookup (SEC-015).
#
# Code Scanning upload (category verilyze-sca) runs on same-repo pull_request
# only. Nightly verilyze.yml owns main-branch uploads; fork PRs stay artifact-only.

name: Supply chain

on:
  push:
    branches: [main]
    paths:
      - Cargo.lock
      - "**/Cargo.toml"
      - pyproject.toml
      - pylock.dev.toml
      - scripts/requirements*.txt
      - sbom/**
      - scripts/generate-sbom.sh
      - scripts/generate-pylock-dev.sh
      - scripts/check-pylock-dev.sh
      - scripts/check_pylock_dev.py
      - scripts/ci-verilyze-scan.sh
      - scripts/ci-enforce-scan-exit.sh
      - scripts/ci-install-vlz-release.sh
      - scripts/lib/ci-install-vlz-release-common.sh
      - scripts/lib/workspace-scan-excludes.sh
      - scripts/lib/ci-verilyze-scan-metrics.sh
      - scripts/ci-verify-vlz-release-version.sh
      - .github/workflows/supply-chain.yml
  pull_request:
    branches: [main]
    paths:
      - Cargo.lock
      - "**/Cargo.toml"
      - pyproject.toml
      - pylock.dev.toml
      - scripts/requirements*.txt
      - sbom/**
      - scripts/generate-sbom.sh
      - scripts/generate-pylock-dev.sh
      - scripts/check-pylock-dev.sh
      - scripts/check_pylock_dev.py
      - scripts/ci-verilyze-scan.sh
      - scripts/ci-enforce-scan-exit.sh
      - scripts/ci-install-vlz-release.sh
      - scripts/lib/ci-install-vlz-release-common.sh
      - scripts/lib/workspace-scan-excludes.sh
      - scripts/lib/ci-verilyze-scan-metrics.sh
      - scripts/ci-verify-vlz-release-version.sh
      - .github/workflows/supply-chain.yml
  merge_group:
    types: [checks_requested]

permissions: {}

jobs:
  sbom:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install Rust (rust-toolchain.toml)
        run: |
          set -euo pipefail
          rustc -vV
          cargo -V

      - name: Verify committed workspace SBOM (SEC-019)
        run: make check-sbom

  verilyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install Rust (rust-toolchain.toml)
        run: |
          set -euo pipefail
          rustc -vV
          cargo -V

      - name: Cache OSV CVE cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/verilyze
          key: >-
            vlz-osv-cache-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            vlz-osv-cache-${{ runner.os }}-

      - name: Build vlz
        run: make release

      - name: Verilyze scan (SEC-015)
        id: verilyze-scan
        continue-on-error: true
        env:
          VLZ_BIN: ${{ github.workspace }}/target/release/vlz
          REPORT_JSON: ${{ runner.temp }}/verilyze-report.json
          REPORT_SARIF: ${{ runner.temp }}/verilyze.sarif
        run: ./scripts/ci-verilyze-scan.sh

      - name: Upload verilyze scan reports
        if: >-
          always() &&
          steps.verilyze-scan.outcome != 'cancelled' &&
          steps.verilyze-scan.outputs.scan_exit != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: verilyze-reports
          path: |
            ${{ runner.temp }}/verilyze-report.json
            ${{ runner.temp }}/verilyze.sarif
          retention-days: 90

      - name: Upload verilyze SARIF to code scanning
        if: >-
          always() &&
          steps.verilyze-scan.outcome != 'cancelled' &&
          steps.verilyze-scan.outputs.scan_exit != '' &&
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          sarif_file: ${{ runner.temp }}/verilyze.sarif
          category: verilyze-sca

      - name: Enforce scan policy (FR-010)
        if: >-
          always() &&
          steps.verilyze-scan.outputs.scan_exit != '' &&
          steps.verilyze-scan.outputs.scan_exit != '0'
        env:
          SCAN_EXIT: ${{ steps.verilyze-scan.outputs.scan_exit }}
        run: ./scripts/ci-enforce-scan-exit.sh
