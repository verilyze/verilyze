---
# Push committed OBS project and package _meta to build.opensuse.org when they
# change on main (OP-*: OBS metadata is git-driven).

name: OBS meta sync

on:
  push:
    branches: [main]
    paths:
      - packaging/obs/**/_meta

permissions: {}

jobs:
  sync-meta:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install osc
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y osc

      - name: Sync OBS project and package _meta
        env:
          OBS_USER: ${{ secrets.OBS_USER }}
          OBS_PASSWORD: ${{ secrets.OBS_PASSWORD }}
          OSC_USERNAME: ${{ secrets.OBS_USER }}
          OSC_PASSWORD: ${{ secrets.OBS_PASSWORD }}
          OSC_APIURL: https://api.opensuse.org
        run: |
          set -euo pipefail
          ./scripts/sync-obs-project-meta.sh \
            --config packaging/obs/obs-project.env \
            --check \
          || ./scripts/sync-obs-project-meta.sh \
            --config packaging/obs/obs-project.env \
            --push
