---
# CI workflow: split into check-fast (headers, build, fmt, clippy, cargo-deny,
# lint) and check-slow (fuzz-changed, coverage-quick) for faster feedback on
# simple changes.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check-dco:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch base branch
        run: git fetch origin "${{ github.event.pull_request.base.ref }}"

      - name: Check DCO
        env:
          GITHUB_BASE_REF: ${{ github.event.pull_request.base.ref }}
          GITHUB_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: ./scripts/check-dco.sh

  check-signatures:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch base branch
        run: git fetch origin "${{ github.event.pull_request.base.ref }}"

      - name: Check commit signatures (presence only)
        env:
          GITHUB_BASE_REF: ${{ github.event.pull_request.base.ref }}
          GITHUB_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: ./scripts/check-signatures.sh --presence-only

  check-fast:
    runs-on: ubuntu-latest
    needs: [check-dco, check-signatures]
    if: >-
      (success() || failure())
      && (needs.check-dco.result == 'success'
          || needs.check-dco.result == 'skipped')
      && (needs.check-signatures.result == 'success'
          || needs.check-signatures.result == 'skipped')
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      # Pin matches CONTRIBUTING.md Quick setup (cargo-deny).
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked --version 0.18.6

      - name: Run check-fast (headers, build, fmt, clippy, cargo-deny, lint)
        run: make -j check-fast

  check-slow:
    runs-on: ubuntu-latest
    needs: [check-dco, check-signatures]
    if: >-
      (success() || failure())
      && (needs.check-dco.result == 'success'
          || needs.check-dco.result == 'skipped')
      && (needs.check-signatures.result == 'success'
          || needs.check-signatures.result == 'skipped')
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust nightly and cargo-llvm-cov
        run: |
          rustup toolchain install nightly
          rustup component add llvm-tools --toolchain nightly
          cargo install cargo-llvm-cov --locked

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Install AFL++ (for fuzz-changed)
        run: sudo apt-get install -y afl++

      - name: Install cargo-afl
        run: cargo install cargo-afl --locked

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Run check-slow (fuzz-changed, coverage-quick)
        run: make -j check-slow
