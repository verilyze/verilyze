---
# CI workflow: check-dco / check-signatures (PRs only), then job check
# (make -j check) and incremental super-linter when deps allow.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Job-scoped tokens (Checkov CKV2_GHA_1; avoid workflow_run for zizmor).
permissions: {}

jobs:
  check-dco:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      # persist-credentials: false removes the token from origin.
      # Fetch needs auth to read the base branch.
      - name: Fetch base branch
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          _auth="$(printf 'https://x-access-token:%s@github.com/%s.git' \
            "${GITHUB_TOKEN}" "${GITHUB_REPOSITORY}")"
          git remote set-url origin "${_auth}"
          git fetch origin "${GITHUB_BASE_REF}"
          git remote set-url origin \
            "https://github.com/${GITHUB_REPOSITORY}.git"

      - name: Check DCO
        env:
          GITHUB_BASE_REF: ${{ github.event.pull_request.base.ref }}
          GITHUB_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: ./scripts/check-dco.sh

  check-signatures:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      # persist-credentials: false removes the token from origin.
      # Fetch needs auth to read the base branch.
      - name: Fetch base branch
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          _auth="$(printf 'https://x-access-token:%s@github.com/%s.git' \
            "${GITHUB_TOKEN}" "${GITHUB_REPOSITORY}")"
          git remote set-url origin "${_auth}"
          git fetch origin "${GITHUB_BASE_REF}"
          git remote set-url origin \
            "https://github.com/${GITHUB_REPOSITORY}.git"

      - name: Check commit signatures (presence only)
        env:
          GITHUB_BASE_REF: ${{ github.event.pull_request.base.ref }}
          GITHUB_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: ./scripts/check-signatures.sh --presence-only

  check:
    runs-on: ubuntu-latest
    needs: [check-dco, check-signatures]
    # actions: write -- saving Actions cache entries (actions/cache, rust-cache)
    # requires the Actions cache API; see GitHub token permissions for workflows.
    permissions:
      contents: read
      actions: write
    if: >-
      (success() || failure())
      && (needs.check-dco.result == 'success'
          || needs.check-dco.result == 'skipped')
      && (needs.check-signatures.result == 'success'
          || needs.check-signatures.result == 'skipped')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # Pinned interpreter so venvs match restore; Makefile uses
      # python3 on PATH.
      - name: Set up Python
        id: python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      # Pip packages: Makefile / ensure-reuse. Exact key miss is normal when
      # inputs change; PRs can still restore from default-branch caches per
      # GitHub cache rules. Broad restore key must prefix-match saved keys:
      # {runner.os}-python-{version}-venvs-{hash} starts with {runner.os}-python-.
      - name: Cache Python venvs
        id: python_venvs_cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            .venv-lint
            .venv-test
            .venv-reuse
          key: >-
            ${{ format('{0}-python-{1}-venvs-{2}', runner.os,
            steps.python.outputs.python-version, hashFiles('Makefile',
            'pyproject.toml', 'scripts/ensure-reuse.sh',
            'scripts/requirements-reuse.txt')) }}
          restore-keys: |
            ${{ runner.os }}-python-${{ steps.python.outputs.python-version }}-venvs-
            ${{ runner.os }}-python-

      # ubuntu-latest ships rustup (see zizmor superfluous-actions: prefer rustup
      # over dtolnay/rust-toolchain). First rustc/cargo in this repo provisions
      # channel and components from rust-toolchain.toml.
      - name: Install Rust (rust-toolchain.toml)
        run: |
          set -euo pipefail
          rustc -vV
          cargo -V

      # Key: VERSION_ID/CODENAME fingerprint (stable across trivial image edits)
      # plus workflow hash so apt package list changes invalidate the cache.
      # Path: Dir::Cache::archives via apt -o.
      - name: Apt archives cache fingerprint
        id: apt_ci
        run: |
          echo "os_sig=$(grep -E '^(VERSION_ID|VERSION_CODENAME)=' /etc/os-release | sha256sum | cut -d' ' -f1)" \
            >> "$GITHUB_OUTPUT"

      - name: Cache apt archives (shellcheck, afl++)
        id: apt_archives_cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ runner.temp }}/apt-archives
          key: >-
            ${{ runner.os }}-apt-archives-shellcheck-afl++-${{
            steps.apt_ci.outputs.os_sig }}-${{
            hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-archives-shellcheck-afl++-

      - name: Install ShellCheck and AFL++
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          _apt_arch="${RUNNER_TEMP}/apt-archives"
          mkdir -p "${_apt_arch}"
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            -o Dir::Cache::archives="${_apt_arch}" \
            shellcheck afl++
          # Cache only *.deb: drop lock, partial/, and any other apt metadata.
          sudo find "${_apt_arch}" -mindepth 1 -maxdepth 1 \
            ! -name '*.deb' -exec rm -rf {} +
          sudo chown -R "$(id -u)":"$(id -g)" "${_apt_arch}"

      # rust-cache: default key hashes rustc -vV (per rustup toolchain),
      # CARGO*/RUST*/CC*/etc. env vars, and Cargo.lock / manifests. That keeps
      # cache aligned with the real compiler; do not disable
      # add-rust-environment-hash-key without understanding stale-cache risk.
      # steps.rust_cache.outputs.cache-hit is true only for a full key match;
      # prefix restores may still help registry/git but clear target/ (see
      # Swatinem/rust-cache restore.ts). Full keys print under "Cache
      # Configuration" in this step's log.
      # Install the pinned toolchain (rust-toolchain.toml, including llvm-tools)
      # before this step so restores stay aligned with the check job.
      - name: Cache Cargo
        id: rust_cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-workspace-crates: true
          cache-on-failure: true

      # actions/cache sets outputs.cache-hit to the string true only on an exact
      # key match; otherwise the output is often omitted (empty), not false.
      - name: Report CI cache diagnostics
        run: |
          echo "Rust cache exact key hit: ${RUST_CACHE_HIT:-false}"
          echo "Python venvs cache exact key hit: ${PYTHON_VENVS_CACHE_HIT:-false}"
          echo "Apt archives cache exact key hit: ${APT_ARCHIVES_CACHE_HIT:-false}"
          echo "Python venv key inputs: runner_os=${RUNNER_OS_VALUE} python_version=${PYTHON_VERSION} venv_inputs_hash=${VENV_INPUTS_HASH}"
          echo "Apt key input: os_sig=${APT_OS_SIG}"
          echo "For full Rust cache and restore keys, expand the prior step log group: Cache Configuration."
        env:
          RUST_CACHE_HIT: ${{ steps.rust_cache.outputs.cache-hit }}
          PYTHON_VENVS_CACHE_HIT: ${{ steps.python_venvs_cache.outputs.cache-hit }}
          APT_ARCHIVES_CACHE_HIT: ${{ steps.apt_archives_cache.outputs.cache-hit }}
          PYTHON_VERSION: ${{ steps.python.outputs.python-version }}
          VENV_INPUTS_HASH: ${{ hashFiles('Makefile', 'pyproject.toml', 'scripts/ensure-reuse.sh', 'scripts/requirements-reuse.txt') }}
          APT_OS_SIG: ${{ steps.apt_ci.outputs.os_sig }}
          RUNNER_OS_VALUE: ${{ runner.os }}

      # Versions: deny matches CONTRIBUTING Quick setup; others pinned for CI.
      - name: Install cargo tooling (llvm-cov, deny, afl, about)
        uses: taiki-e/install-action@cf39a74df4a72510be4e5b63348d61067f11e64a # v2.75.0
        with:
          tool: >-
            cargo-llvm-cov@0.8.5,cargo-deny@0.19.0,cargo-afl@0.17.1,cargo-about@0.8.4

      - name: Run make -j check (full Makefile gate)
        run: make -j check

      - name: Upload Cobertura XML reports
        if: success()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: cobertura-xml
          path: |
            reports/cobertura-rust.xml
            reports/cobertura-python.xml
          if-no-files-found: error

  coverage-pr-comment:
    runs-on: ubuntu-latest
    needs: check
    if: >-
      success()
      && github.event_name == 'pull_request'
      && github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: write
      actions: read
    steps:
      - name: Download Cobertura artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: cobertura-xml

      # CodeCoverageSummary globs from the container workspace; ensure XML paths
      # match reports/ even if the artifact extracts with an extra directory level.
      - name: Normalize Cobertura XML under reports/
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f reports/cobertura-rust.xml && -f reports/cobertura-python.xml ]]; then
            exit 0
          fi
          rust=$(find . -path './.git' -prune -o -name cobertura-rust.xml -type f -print -quit)
          py=$(find . -path './.git' -prune -o -name cobertura-python.xml -type f -print -quit)
          if [[ -z "${rust:-}" || -z "${py:-}" ]]; then
            echo 'Cobertura XML not found after artifact download' >&2
            find . -path './.git' -prune -o -type f -print >&2
            exit 1
          fi
          mkdir -p reports
          cp -f "$rust" "$py" reports/

      - name: Coverage summary (Cobertura)
        uses: irongut/CodeCoverageSummary@51cc3a756ddcd398d447c044c02cb6aa83fdae95 # v1.3.0
        with:
          filename: '**/cobertura-rust.xml,**/cobertura-python.xml'
          badge: true
          fail_below_min: false
          format: markdown
          hide_branch_rate: true
          hide_complexity: true
          indicators: true
          output: file
          thresholds: '85 90'

      - name: Post coverage summary on PR
        uses: marocchino/sticky-pull-request-comment@d4d6b0936434b21bc8345ad45a440c5f7d2c40ff # v3.0.3
        with:
          header: cobertura-summary
          recreate: true
          path: code-coverage-results.md

  super-linter:
    runs-on: ubuntu-latest
    needs: [check-dco, check-signatures]
    permissions:
      contents: read
    if: >-
      (success() || failure())
      && (needs.check-dco.result == 'success'
          || needs.check-dco.result == 'skipped')
      && (needs.check-signatures.result == 'success'
          || needs.check-signatures.result == 'skipped')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run super-linter (incremental)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: main
          SAVE_SUPER_LINTER_OUTPUT: true
          SAVE_SUPER_LINTER_SUMMARY: true
        run: ./scripts/super-linter.sh

      - name: Upload super-linter logs on failure
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: super-linter-logs
          path: |
            super-linter.log
            super-linter-summary.md
