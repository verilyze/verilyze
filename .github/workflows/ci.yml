---
# CI workflow: check-dco / check-signatures (PRs only), then job check
# (make -j check) and incremental super-linter when deps allow.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check-dco:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      # persist-credentials: false removes the token from origin.
      # Fetch needs auth to read the base branch.
      - name: Fetch base branch
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          _auth="$(printf 'https://x-access-token:%s@github.com/%s.git' \
            "${GITHUB_TOKEN}" "${GITHUB_REPOSITORY}")"
          git remote set-url origin "${_auth}"
          git fetch origin "${GITHUB_BASE_REF}"
          git remote set-url origin \
            "https://github.com/${GITHUB_REPOSITORY}.git"

      - name: Check DCO
        env:
          GITHUB_BASE_REF: ${{ github.event.pull_request.base.ref }}
          GITHUB_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: ./scripts/check-dco.sh

  check-signatures:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      # persist-credentials: false removes the token from origin.
      # Fetch needs auth to read the base branch.
      - name: Fetch base branch
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          _auth="$(printf 'https://x-access-token:%s@github.com/%s.git' \
            "${GITHUB_TOKEN}" "${GITHUB_REPOSITORY}")"
          git remote set-url origin "${_auth}"
          git fetch origin "${GITHUB_BASE_REF}"
          git remote set-url origin \
            "https://github.com/${GITHUB_REPOSITORY}.git"

      - name: Check commit signatures (presence only)
        env:
          GITHUB_BASE_REF: ${{ github.event.pull_request.base.ref }}
          GITHUB_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: ./scripts/check-signatures.sh --presence-only

  check:
    runs-on: ubuntu-latest
    needs: [check-dco, check-signatures]
    if: >-
      (success() || failure())
      && (needs.check-dco.result == 'success'
          || needs.check-dco.result == 'skipped')
      && (needs.check-signatures.result == 'success'
          || needs.check-signatures.result == 'skipped')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      # Pinned interpreter so venvs match restore; Makefile uses
      # python3 on PATH.
      - name: Set up Python
        id: python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      # Pip packages: Makefile / ensure-reuse. Cache miss if no prior save
      # (exact key or restore-keys). Fork PRs cannot read base repo caches.
      - name: Cache Python venvs
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            .venv-lint
            .venv-test
            .venv-reuse
          key: >-
            ${{ format('{0}-python-{1}-venvs-{2}', runner.os,
            steps.python.outputs.python-version, hashFiles('Makefile',
            'pyproject.toml', 'scripts/ensure-reuse.sh')) }}
          restore-keys: |
            Linux-python-${{ steps.python.outputs.python-version }}-venvs-
            ${{ runner.os }}-python-venvs-

      # Channel must match rust-toolchain.toml (single source for local + CI).
      # dtolnay/rust-toolchain requires an explicit toolchain input; it does not
      # infer rust-toolchain.toml when `with:` is omitted.
      - name: Read rust-toolchain.toml channel
        id: rustc_pin
        run: |
          _ch="$(grep -E '^channel[[:space:]]*=' rust-toolchain.toml | head -1 \
            | sed -E 's/^channel[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')"
          test -n "${_ch}"
          echo "channel=${_ch}" >> "${GITHUB_OUTPUT}"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master  # zizmor: ignore[superfluous-actions]
        with:
          toolchain: ${{ steps.rustc_pin.outputs.channel }}
          components: rustfmt, clippy, llvm-tools

      # Key: VERSION_ID/CODENAME fingerprint (stable across trivial image edits)
      # plus workflow hash so apt package list changes invalidate the cache.
      # Path: Dir::Cache::archives via apt -o.
      - name: Apt archives cache fingerprint
        id: apt_ci
        run: |
          echo "os_sig=$(grep -E '^(VERSION_ID|VERSION_CODENAME)=' /etc/os-release | sha256sum | cut -d' ' -f1)" \
            >> "$GITHUB_OUTPUT"

      - name: Cache apt archives (shellcheck, afl++)
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ${{ runner.temp }}/apt-archives
          key: >-
            ${{ runner.os }}-apt-archives-shellcheck-afl++-${{
            steps.apt_ci.outputs.os_sig }}-${{
            hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-archives-shellcheck-afl++-

      - name: Install ShellCheck and AFL++
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          _apt_arch="${RUNNER_TEMP}/apt-archives"
          mkdir -p "${_apt_arch}"
          sudo apt-get update
          sudo apt-get install -y \
            -o Dir::Cache::archives="${_apt_arch}" \
            shellcheck afl++
          # Cache only *.deb: drop lock, partial/, and any other apt metadata.
          sudo find "${_apt_arch}" -mindepth 1 -maxdepth 1 \
            ! -name '*.deb' -exec rm -rf {} +
          sudo chown -R "$(id -u)":"$(id -g)" "${_apt_arch}"

      # rust-cache hashes every installed toolchain for the restore key.
      # Install the full stable toolchain (including llvm-tools for coverage)
      # before this step so restores stay aligned with the check job.
      - name: Cache Cargo
        id: rust_cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-workspace-crates: true
          cache-on-failure: true

      - name: Report Rust cache restore
        run: |
          echo "Rust cache exact key hit: ${RUST_CACHE_HIT}"
        env:
          RUST_CACHE_HIT: ${{ steps.rust_cache.outputs.cache-hit }}

      # Versions: deny matches CONTRIBUTING Quick setup; others pinned for CI.
      - name: Install cargo tooling (llvm-cov, deny, afl, about)
        uses: taiki-e/install-action@fd0f63e180a477d7434580b6d80817978b9ff2b8 # v2
        with:
          tool: >-
            cargo-llvm-cov@0.8.5,cargo-deny@0.19.0,cargo-afl@0.17.1,cargo-about@0.8.4

      - name: Run make -j check (full Makefile gate)
        run: make -j check

  super-linter:
    runs-on: ubuntu-latest
    needs: [check-dco, check-signatures]
    if: >-
      (success() || failure())
      && (needs.check-dco.result == 'success'
          || needs.check-dco.result == 'skipped')
      && (needs.check-signatures.result == 'success'
          || needs.check-signatures.result == 'skipped')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run super-linter (incremental)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: main
          SAVE_SUPER_LINTER_OUTPUT: true
          SAVE_SUPER_LINTER_SUMMARY: true
        run: ./scripts/super-linter.sh

      - name: Upload super-linter logs on failure
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: super-linter-logs
          path: |
            super-linter.log
            super-linter-summary.md
