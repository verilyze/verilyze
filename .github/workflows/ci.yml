---
# CI workflow: check-dco / check-signatures (PRs only), then check-fast,
# check-slow, and incremental super-linter in parallel when deps allow.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check-dco:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      # persist-credentials: false removes the token from origin.
      # Fetch needs auth to read the base branch.
      # yamllint disable rule:line-length
      - name: Fetch base branch
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch origin "${{ github.event.pull_request.base.ref }}"
          git remote set-url origin \
            "https://github.com/${GITHUB_REPOSITORY}.git"
      # yamllint enable rule:line-length

      - name: Check DCO
        env:
          GITHUB_BASE_REF: ${{ github.event.pull_request.base.ref }}
          GITHUB_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: ./scripts/check-dco.sh

  check-signatures:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      # persist-credentials: false removes the token from origin.
      # Fetch needs auth to read the base branch.
      # yamllint disable rule:line-length
      - name: Fetch base branch
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch origin "${{ github.event.pull_request.base.ref }}"
          git remote set-url origin \
            "https://github.com/${GITHUB_REPOSITORY}.git"
      # yamllint enable rule:line-length

      - name: Check commit signatures (presence only)
        env:
          GITHUB_BASE_REF: ${{ github.event.pull_request.base.ref }}
          GITHUB_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: ./scripts/check-signatures.sh --presence-only

  check-fast:
    runs-on: ubuntu-latest
    needs: [check-dco, check-signatures]
    if: >-
      (success() || failure())
      && (needs.check-dco.result == 'success'
          || needs.check-dco.result == 'skipped')
      && (needs.check-signatures.result == 'success'
          || needs.check-signatures.result == 'skipped')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Cache Cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      # Pin matches CONTRIBUTING.md Quick setup (cargo-deny).
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked --version 0.18.6

      - name: Run check-fast (headers, build, fmt, clippy, cargo-deny, lint)
        run: make -j check-fast

  check-slow:
    runs-on: ubuntu-latest
    needs: [check-dco, check-signatures]
    if: >-
      (success() || failure())
      && (needs.check-dco.result == 'success'
          || needs.check-dco.result == 'skipped')
      && (needs.check-signatures.result == 'success'
          || needs.check-signatures.result == 'skipped')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install Rust nightly and cargo-llvm-cov
        run: |
          rustup toolchain install nightly
          rustup component add llvm-tools --toolchain nightly
          cargo install cargo-llvm-cov --locked

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Install AFL++ (for fuzz-changed)
        run: sudo apt-get install -y afl++

      - name: Install cargo-afl
        run: cargo install cargo-afl --locked

      - name: Cache Cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Run check-slow (fuzz-changed, coverage-quick)
        run: make -j check-slow

  super-linter:
    runs-on: ubuntu-latest
    needs: [check-dco, check-signatures]
    if: >-
      (success() || failure())
      && (needs.check-dco.result == 'success'
          || needs.check-dco.result == 'skipped')
      && (needs.check-signatures.result == 'success'
          || needs.check-signatures.result == 'skipped')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run super-linter (incremental)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: main
          SAVE_SUPER_LINTER_OUTPUT: true
          SAVE_SUPER_LINTER_SUMMARY: true
        run: ./scripts/super-linter.sh

      - name: Upload super-linter logs on failure
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: super-linter-logs
          path: |
            super-linter.log
            super-linter-summary.md
