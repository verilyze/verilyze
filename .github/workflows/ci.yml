#
# CI workflow: runs make check (headers, build, fmt-check, clippy,
# fuzz-changed, coverage-quick, tests, lint).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Rust nightly and cargo-llvm-cov
        run: |
          rustup toolchain install nightly
          rustup component add llvm-tools --toolchain nightly
          cargo install cargo-llvm-cov --locked

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Install AFL++ (for fuzz-changed)
        run: sudo apt-get install -y afl++

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Setup (bootstrap venvs)
        run: make setup

      - name: Run check (headers, build, fmt, clippy, fuzz-changed, coverage, lint)
        run: make check
