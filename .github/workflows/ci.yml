#
# CI workflow: split into check-fast (headers, build, fmt, clippy, lint) and
# check-slow (fuzz-changed, coverage-quick) for faster feedback on simple
# changes.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-dco:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin "${{ github.event.pull_request.base.ref }}"

      - name: Check DCO
        env:
          GITHUB_BASE_REF: ${{ github.event.pull_request.base.ref }}
          GITHUB_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: ./scripts/check-dco.sh

  check-fast:
    runs-on: ubuntu-latest
    needs: [check-dco]
    if: always() && (needs.check-dco.result == 'success' || needs.check-dco.result == 'skipped')
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Run check-fast (headers, build, fmt, clippy, lint)
        run: make -j check-fast

  check-slow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust nightly and cargo-llvm-cov
        run: |
          rustup toolchain install nightly
          rustup component add llvm-tools --toolchain nightly
          cargo install cargo-llvm-cov --locked

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Install AFL++ (for fuzz-changed)
        run: sudo apt-get install -y afl++

      - name: Install cargo-afl
        run: cargo install cargo-afl --locked

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Run check-slow (fuzz-changed, coverage-quick)
        run: make -j check-slow
