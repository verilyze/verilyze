---
# CI workflow: check-dco / check-signatures (PRs only), then job check
# (make -j check) and incremental super-linter when deps allow.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check-dco:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      # persist-credentials: false removes the token from origin.
      # Fetch needs auth to read the base branch.
      - name: Fetch base branch
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          _auth="$(printf 'https://x-access-token:%s@github.com/%s.git' \
            "${GITHUB_TOKEN}" "${GITHUB_REPOSITORY}")"
          git remote set-url origin "${_auth}"
          git fetch origin "${{ github.event.pull_request.base.ref }}"
          git remote set-url origin \
            "https://github.com/${GITHUB_REPOSITORY}.git"

      - name: Check DCO
        env:
          GITHUB_BASE_REF: ${{ github.event.pull_request.base.ref }}
          GITHUB_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: ./scripts/check-dco.sh

  check-signatures:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      # persist-credentials: false removes the token from origin.
      # Fetch needs auth to read the base branch.
      - name: Fetch base branch
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          _auth="$(printf 'https://x-access-token:%s@github.com/%s.git' \
            "${GITHUB_TOKEN}" "${GITHUB_REPOSITORY}")"
          git remote set-url origin "${_auth}"
          git fetch origin "${{ github.event.pull_request.base.ref }}"
          git remote set-url origin \
            "https://github.com/${GITHUB_REPOSITORY}.git"

      - name: Check commit signatures (presence only)
        env:
          GITHUB_BASE_REF: ${{ github.event.pull_request.base.ref }}
          GITHUB_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: ./scripts/check-signatures.sh --presence-only

  check:
    runs-on: ubuntu-latest
    needs: [check-dco, check-signatures]
    if: >-
      (success() || failure())
      && (needs.check-dco.result == 'success'
          || needs.check-dco.result == 'skipped')
      && (needs.check-signatures.result == 'success'
          || needs.check-signatures.result == 'skipped')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      # Pinned interpreter so venvs match restore; Makefile uses
      # python3 on PATH.
      - name: Set up Python
        id: python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.14"

      # Pip packages: Makefile / ensure-reuse. Cache miss if no prior save
      # (exact key or restore-keys). Fork PRs cannot read base repo caches.
      - name: Cache Python venvs
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: |
            .venv-lint
            .venv-test
            .venv-reuse
          key: >-
            ${{ format('{0}-python-{1}-venvs-{2}', runner.os,
            steps.python.outputs.python-version, hashFiles('Makefile',
            'pyproject.toml', 'scripts/ensure-reuse.sh')) }}
          restore-keys: |
            Linux-python-${{ steps.python.outputs.python-version }}-venvs-
            ${{ runner.os }}-python-venvs-

      - name: Install Rust
        env:
          toolchain: stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          components: rustfmt, clippy

      - name: Install Rust nightly (llvm-tools for cargo-llvm-cov)
        run: |
          rustup toolchain install nightly
          rustup component add llvm-tools --toolchain nightly

      - name: Install ShellCheck and AFL++
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck afl++

      # Run rust-cache before cargo install. It restores ~/.cargo/bin and
      # target/ from prior runs (registry, git, target, bin).
      - name: Cache Cargo
        uses: Swatinem/rust-cache@f51f967e158417aafa338a1e46ab22095f07aa01

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      # Pin matches CONTRIBUTING.md Quick setup (cargo-deny).
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked --version 0.18.6

      - name: Install cargo-afl
        run: cargo install cargo-afl --locked

      - name: Install cargo-about
        run: cargo install cargo-about --locked

      - name: Run make -j check (full Makefile gate)
        run: make -j check

  super-linter:
    runs-on: ubuntu-latest
    needs: [check-dco, check-signatures]
    if: >-
      (success() || failure())
      && (needs.check-dco.result == 'success'
          || needs.check-dco.result == 'skipped')
      && (needs.check-signatures.result == 'success'
          || needs.check-signatures.result == 'skipped')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run super-linter (incremental)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: main
          SAVE_SUPER_LINTER_OUTPUT: true
          SAVE_SUPER_LINTER_SUMMARY: true
        run: ./scripts/super-linter.sh

      - name: Upload super-linter logs on failure
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: super-linter-logs
          path: |
            super-linter.log
            super-linter-summary.md
