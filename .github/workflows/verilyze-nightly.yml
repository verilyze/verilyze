---
# Nightly SEC-015 self-scan with latest published release binary.
# Sole main-branch producer for Code Scanning category verilyze-sca.
# README badge points at this workflow.

name: verilyze

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verilyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Install verified vlz release
        env:
          GH_TOKEN: ${{ github.token }}
          VLZ_RELEASE_DOWNLOAD_DIR: ${{ runner.temp }}/vlz-release
          EXPECTED_BUILDER_REGEX: ^https://github\.com/${{ github.repository }}/\.github/workflows/release\.yml@
          SLSA_GENERATOR_BUILDER_REGEX: ^https://github\.com/slsa-framework/slsa-github-generator/\.github/workflows/generator_generic_slsa3\.yml@(v2\.1\.0|f7dd8c54c2067bafc12ca7a55595d5ee9b75204a)$
        run: |
          set -euo pipefail
          VLZ_BIN="$(./scripts/ci-install-vlz-release.sh)"
          echo "VLZ_BIN=${VLZ_BIN}" >> "${GITHUB_ENV}"

      - name: Verify vlz release version (Tier 1+2 SARIF)
        run: ./scripts/ci-verify-vlz-release-version.sh "${VLZ_BIN}"

      - name: Cache OSV CVE cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/verilyze
          key: >-
            vlz-osv-cache-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            vlz-osv-cache-${{ runner.os }}-

      - name: Verilyze scan (SEC-015)
        id: verilyze-scan
        continue-on-error: true
        env:
          VLZ_REACHABILITY_MODE: best-available
          REPORT_JSON: ${{ runner.temp }}/verilyze-report.json
          REPORT_SARIF: ${{ runner.temp }}/verilyze.sarif
        run: ./scripts/ci-verilyze-scan.sh

      - name: Upload verilyze scan reports
        if: >-
          always() &&
          steps.verilyze-scan.outcome != 'cancelled' &&
          steps.verilyze-scan.outputs.scan_exit != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: verilyze-reports
          path: |
            ${{ runner.temp }}/verilyze-report.json
            ${{ runner.temp }}/verilyze.sarif
          retention-days: 90

      - name: Upload verilyze SARIF to code scanning
        if: >-
          always() &&
          steps.verilyze-scan.outcome != 'cancelled' &&
          steps.verilyze-scan.outputs.scan_exit != ''
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: ${{ runner.temp }}/verilyze.sarif
          category: verilyze-sca

      - name: Enforce scan policy (FR-010)
        if: >-
          always() &&
          steps.verilyze-scan.outputs.scan_exit != '' &&
          steps.verilyze-scan.outputs.scan_exit != '0'
        run: exit "${{ steps.verilyze-scan.outputs.scan_exit }}"
