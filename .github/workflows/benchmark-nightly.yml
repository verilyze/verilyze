---
# Nightly benchmark gate (NFR-001, FR-029).

name: Benchmark nightly

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  benchmark-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        id: python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.14"

      - name: Cache Python venvs
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .venv-test
          key: >-
            ${{ format('{0}-python-{1}-venvs-test-{2}', runner.os,
            steps.python.outputs.python-version, hashFiles('Makefile',
            'pyproject.toml')) }}
          restore-keys: |
            ${{ runner.os }}-python-${{ steps.python.outputs.python-version }}-venvs-test-

      - name: Install Rust (rust-toolchain.toml)
        run: |
          set -euo pipefail
          rustc -vV
          cargo -V

      - name: Bootstrap test venv
        run: make setup

      - name: Build vlz release
        run: make release

      - name: Run benchmark gate (NFR-001)
        run: make benchmark-gate
