#
# Incremental super-linter (slim) on changed files only.

name: Super-linter

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  super-linter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run super-linter (incremental)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: main
          SAVE_SUPER_LINTER_OUTPUT: true
          SAVE_SUPER_LINTER_SUMMARY: true
        run: ./scripts/super-linter.sh

      - name: Upload super-linter logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: super-linter-logs
          path: |
            super-linter.log
            super-linter-summary.md
