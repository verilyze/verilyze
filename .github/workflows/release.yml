---
# Release workflow: builds packages and Docker image on version tags.
# Triggered by pushing a tag matching v*.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  preflight-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.verify.outputs.version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Verify tag matches workspace version
        id: verify
        run: |
          set -euo pipefail
          VERSION="$(./scripts/release-verify-tag-version.sh "${GITHUB_REF}")"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Verify OBS signing metadata
        run: |
          set -euo pipefail
          ./scripts/check-obs-signing.sh \
            --config packaging/obs/obs-project.env

  build-binary:
    needs: preflight-release
    runs-on: ubuntu-latest
    # actions: write -- upload-artifact uses the Actions artifacts API.
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # Provision toolchain from rust-toolchain.toml (see zizmor superfluous-actions).
      - name: Install Rust (rust-toolchain.toml)
        run: |
          set -euo pipefail
          rustc -vV
          cargo -V

      - name: Build release binary
        run: cargo build --release --locked

      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vlz-linux-x86_64
          path: target/release/vlz

  build-deb:
    needs: [preflight-release, build-binary]
    runs-on: ubuntu-latest
    # actions: write -- upload-artifact uses the Actions artifacts API.
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Rust (rust-toolchain.toml)
        run: |
          set -euo pipefail
          rustc -vV
          cargo -V

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build .deb
        run: make deb

      - name: Upload .deb artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: deb-package
          path: target/debian/*.deb

  build-rpm:
    needs: [preflight-release, build-binary]
    runs-on: ubuntu-latest
    # actions: write -- upload-artifact uses the Actions artifacts API.
    permissions:
      contents: read
      actions: write
    container:
      image: fedora:45
    steps:
      # Git must exist before actions/checkout so the clone uses a real .git
      # tree (not the REST API tarball). make rpm runs git archive on HEAD.
      - name: Install git for actions/checkout
        run: |
          set -euo pipefail
          dnf install -y git-core
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install build tools
        run: dnf install -y rpm-build rust cargo openssl-devel make python3

      - name: Build .rpm
        run: make rpm

      - name: Upload .rpm artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rpm-package
          path: packaging/rpm/RPMS/**/*.rpm

  build-docker:
    needs: preflight-release
    runs-on: ubuntu-latest
    # packages: write for docker push to ghcr.io with GITHUB_TOKEN.
    permissions:
      contents: read
      actions: write
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Build Docker image
        env:
          REPO: ${{ github.repository }}
          VERSION: ${{ needs.preflight-release.outputs.version }}
        run: |
          docker build \
            -f packaging/docker/Dockerfile \
            -t "ghcr.io/${REPO}:${VERSION}" \
            -t "ghcr.io/${REPO}:latest" .

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image
        id: push-image
        env:
          REPO: ${{ github.repository }}
          VERSION: ${{ needs.preflight-release.outputs.version }}
        run: |
          set -euo pipefail
          docker push "ghcr.io/${REPO}:${VERSION}"
          docker push "ghcr.io/${REPO}:latest"
          digest="$(docker inspect --format='{{index .RepoDigests 0}}' "ghcr.io/${REPO}:${VERSION}" | awk -F@ '{print $2}')"
          if [[ -z "${digest}" ]]; then
            echo "::error::could not resolve pushed image digest."
            exit 1
          fi
          echo "digest=${digest}" >> "${GITHUB_OUTPUT}"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign container image (keyless)
        env:
          REPO: ${{ github.repository }}
          VERSION: ${{ needs.preflight-release.outputs.version }}
          DIGEST: ${{ steps.push-image.outputs.digest }}
        run: |
          set -euo pipefail
          cosign sign --yes "ghcr.io/${REPO}@${DIGEST}"

      - name: Attest container image provenance
        env:
          REPO: ${{ github.repository }}
          VERSION: ${{ needs.preflight-release.outputs.version }}
          DIGEST: ${{ steps.push-image.outputs.digest }}
          BUILDER_ID: https://github.com/${{ github.repository }}/.github/workflows/release.yml@${{ github.ref }}
        run: |
          set -euo pipefail
          cat > container-provenance.json << 'EOF'
          {
            "buildType": "https://github.com/Attestations/GitHubActionsWorkflow@v1",
            "builder": {
              "id": "${BUILDER_ID}"
            },
            "invocation": {
              "configSource": {
                "uri": "${{ github.repositoryUrl }}",
                "entryPoint": ".github/workflows/release.yml"
              },
              "parameters": {
                "sourceRevision": "${{ github.sha }}"
              }
            }
          }
          EOF
          cosign attest --yes \
            --predicate container-provenance.json \
            --type slsaprovenance \
            "ghcr.io/${REPO}@${DIGEST}"

  create-release:
    needs: [preflight-release, build-binary, build-deb, build-rpm, build-docker]
    runs-on: ubuntu-latest
    # contents: write -- GitHub Release and asset upload; actions: read -- download-artifact.
    permissions:
      contents: write
      actions: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-artifacts

      - name: Build release notes from CHANGELOG.md
        env:
          VERSION: ${{ needs.preflight-release.outputs.version }}
        run: |
          set -euo pipefail
          ./scripts/extract-changelog-for-release.sh "$VERSION" > release-body.md
          if [ ! -s release-body.md ]; then
            echo "::error::Release notes empty; add a curated ## [$VERSION] section to CHANGELOG.md before tagging."
            exit 1
          fi

      - name: Generate SHA256 checksums
        run: |
          set -euo pipefail
          ./scripts/release-generate-checksums.sh "release-artifacts" >/dev/null

      - name: Generate release artifact manifest
        run: |
          set -euo pipefail
          ./scripts/release-list-artifacts.sh \
            "release-artifacts" \
            --include-sha256sums > release-artifacts/ARTIFACTS.list

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign release artifacts (keyless)
        run: |
          set -euo pipefail
          while IFS= read -r rel_path; do
            file="release-artifacts/${rel_path}"
            cosign sign-blob --yes \
              --bundle "${file}.sigstore.json" \
              "${file}"
          done < release-artifacts/ARTIFACTS.list

      - name: Attest release artifact provenance
        env:
          BUILDER_ID: https://github.com/${{ github.repository }}/.github/workflows/release.yml@${{ github.ref }}
        run: |
          set -euo pipefail
          while IFS= read -r rel_path; do
            file="release-artifacts/${rel_path}"
            digest="$(sha256sum "${file}" | awk '{print $1}')"
            predicate_file="${file}.provenance.json"
            cat > "${predicate_file}" <<EOF
          {
            "buildType": "https://github.com/Attestations/GitHubActionsWorkflow@v1",
            "builder": {
              "id": "${BUILDER_ID}"
            },
            "invocation": {
              "configSource": {
                "uri": "${{ github.repositoryUrl }}",
                "entryPoint": ".github/workflows/release.yml"
              },
              "parameters": {
                "sourceRevision": "${{ github.sha }}"
              }
            },
            "subject": [
              {
                "name": "${rel_path}",
                "digest": {
                  "sha256": "${digest}"
                }
              }
            ]
          }
          EOF
            cosign attest-blob --yes \
              --type slsaprovenance \
              --predicate "${predicate_file}" \
              --bundle "${file}.intoto.jsonl" \
              "${file}"
            rm -f "${predicate_file}"
          done < release-artifacts/ARTIFACTS.list

      - name: Verify signatures, attestations, and checksums (local)
        env:
          EXPECTED_BUILDER_REGEX: ^https://github\.com/${{ github.repository }}/\.github/workflows/release\.yml@
        run: |
          set -euo pipefail
          ./scripts/release-verify-bundle.sh release-artifacts

      - name: Create draft GitHub Release
        id: draft_release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0  # zizmor: ignore[superfluous-actions]
        with:
          draft: true
          generate_release_notes: false
          body_path: release-body.md
          files: |
            release-artifacts/vlz-linux-x86_64/vlz
            release-artifacts/vlz-linux-x86_64/vlz.sigstore.json
            release-artifacts/vlz-linux-x86_64/vlz.intoto.jsonl
            release-artifacts/deb-package/*.deb
            release-artifacts/deb-package/*.deb.sigstore.json
            release-artifacts/deb-package/*.deb.intoto.jsonl
            release-artifacts/rpm-package/**/*.rpm
            release-artifacts/rpm-package/**/*.rpm.sigstore.json
            release-artifacts/rpm-package/**/*.rpm.intoto.jsonl
            release-artifacts/SHA256SUMS
            release-artifacts/SHA256SUMS.sigstore.json
            release-artifacts/SHA256SUMS.intoto.jsonl

      - name: Re-verify draft release assets from GitHub
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          EXPECTED_BUILDER_REGEX: ^https://github\.com/${{ github.repository }}/\.github/workflows/release\.yml@
        run: |
          set -euo pipefail
          rm -rf draft-verify
          mkdir -p draft-verify
          gh release download "${TAG}" --dir draft-verify
          ./scripts/release-restore-download-layout.sh draft-verify
          ./scripts/release-list-artifacts.sh draft-verify \
            --include-sha256sums > draft-verify/ARTIFACTS.list
          ./scripts/release-verify-bundle.sh draft-verify

      - name: Publish release (make immutable)
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          gh release edit "${TAG}" --draft=false

  publish-obs:
    needs: preflight-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust (rust-toolchain.toml)
        run: |
          set -euo pipefail
          rustc -vV
          cargo -V

      - name: Install OBS upload tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y osc xz-utils zstd

      - name: Publish OBS release sources and trigger rebuild
        env:
          VERSION: ${{ needs.preflight-release.outputs.version }}
          OBS_USER: ${{ secrets.OBS_USER }}
          OBS_PASSWORD: ${{ secrets.OBS_PASSWORD }}
          OSC_USERNAME: ${{ secrets.OBS_USER }}
          OSC_PASSWORD: ${{ secrets.OBS_PASSWORD }}
          OSC_APIURL: https://api.opensuse.org
          OBS_TOKEN_REBUILD: ${{ secrets.OBS_TOKEN_REBUILD }}
        run: |
          set -euo pipefail
          ./scripts/obs-upload-release-sources.sh \
            --config packaging/obs/obs-project.env \
            --version "${VERSION}" \
            --git-ref "${GITHUB_REF_NAME}"
          ./scripts/obs-trigger-build.sh \
            --config packaging/obs/obs-project.env \
            --version "${VERSION}" \
            --skip-runservice
