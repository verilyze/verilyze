---
# Release workflow: builds packages and Docker image on version tags.
# Triggered by pushing a tag matching v*.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  preflight-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.verify.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Verify tag matches workspace version
        id: verify
        run: |
          set -euo pipefail
          VERSION="$(./scripts/release-verify-tag-version.sh "${GITHUB_REF}")"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

  build-binary:
    needs: preflight-release
    runs-on: ubuntu-latest
    # actions: write -- upload-artifact uses the Actions artifacts API.
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # Provision toolchain from rust-toolchain.toml (see zizmor superfluous-actions).
      - name: Install Rust (rust-toolchain.toml)
        run: |
          set -euo pipefail
          rustc -vV
          cargo -V

      - name: Build release binary
        run: cargo build --release --locked

      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vlz-linux-x86_64
          path: target/release/vlz

  build-deb:
    needs: [preflight-release, build-binary]
    runs-on: ubuntu-latest
    # actions: write -- upload-artifact uses the Actions artifacts API.
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust (rust-toolchain.toml)
        run: |
          set -euo pipefail
          rustc -vV
          cargo -V

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build .deb
        run: make deb

      - name: Upload .deb artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: deb-package
          path: target/debian/*.deb

  build-rpm:
    needs: [preflight-release, build-binary]
    runs-on: ubuntu-latest
    # actions: write -- upload-artifact uses the Actions artifacts API.
    permissions:
      contents: read
      actions: write
    container:
      image: fedora:45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install build tools
        run: dnf install -y rpm-build rust cargo openssl-devel git make

      - name: Build .rpm
        run: make rpm

      - name: Upload .rpm artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rpm-package
          path: packaging/rpm/RPMS/**/*.rpm

  build-docker:
    needs: preflight-release
    runs-on: ubuntu-latest
    # packages: write for docker push to ghcr.io with GITHUB_TOKEN.
    permissions:
      contents: read
      actions: write
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Build Docker image
        env:
          REPO: ${{ github.repository }}
          VERSION: ${{ needs.preflight-release.outputs.version }}
        run: |
          docker build \
            -f packaging/docker/Dockerfile \
            -t "ghcr.io/${REPO}:${VERSION}" \
            -t "ghcr.io/${REPO}:latest" .

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image
        id: push-image
        env:
          REPO: ${{ github.repository }}
          VERSION: ${{ needs.preflight-release.outputs.version }}
        run: |
          set -euo pipefail
          docker push "ghcr.io/${REPO}:${VERSION}"
          docker push "ghcr.io/${REPO}:latest"
          digest="$(docker inspect --format='{{index .RepoDigests 0}}' "ghcr.io/${REPO}:${VERSION}" | awk -F@ '{print $2}')"
          if [[ -z "${digest}" ]]; then
            echo "::error::could not resolve pushed image digest."
            exit 1
          fi
          echo "digest=${digest}" >> "${GITHUB_OUTPUT}"

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign container image (keyless)
        env:
          REPO: ${{ github.repository }}
          VERSION: ${{ needs.preflight-release.outputs.version }}
          DIGEST: ${{ steps.push-image.outputs.digest }}
        run: |
          set -euo pipefail
          cosign sign --yes "ghcr.io/${REPO}@${DIGEST}"

      - name: Attest container image provenance
        env:
          REPO: ${{ github.repository }}
          VERSION: ${{ needs.preflight-release.outputs.version }}
          DIGEST: ${{ steps.push-image.outputs.digest }}
        run: |
          set -euo pipefail
          cat > container-provenance.json << 'EOF'
          {
            "buildType": "https://github.com/Attestations/GitHubActionsWorkflow@v1",
            "invocation": {
              "configSource": {
                "uri": "${{ github.repositoryUrl }}",
                "entryPoint": ".github/workflows/release.yml"
              },
              "parameters": {
                "sourceRevision": "${{ github.sha }}"
              }
            }
          }
          EOF
          cosign attest --yes \
            --predicate container-provenance.json \
            --type slsaprovenance \
            "ghcr.io/${REPO}@${DIGEST}"

  create-release:
    needs: [preflight-release, build-binary, build-deb, build-rpm, build-docker]
    runs-on: ubuntu-latest
    # contents: write -- GitHub Release and asset upload; actions: read -- download-artifact.
    permissions:
      contents: write
      actions: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-artifacts

      - name: Build release notes from CHANGELOG.md
        env:
          VERSION: ${{ needs.preflight-release.outputs.version }}
        run: |
          set -euo pipefail
          ./scripts/extract-changelog-for-release.sh "$VERSION" > release-body.md
          if [ ! -s release-body.md ]; then
            echo "::error::Release notes empty; add a curated ## [$VERSION] section to CHANGELOG.md before tagging."
            exit 1
          fi

      - name: Generate SHA256 checksums
        run: |
          set -euo pipefail
          ./scripts/release-generate-checksums.sh "release-artifacts" >/dev/null

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign release artifacts (keyless)
        run: |
          set -euo pipefail
          shopt -s nullglob globstar
          for file in \
            release-artifacts/vlz-linux-x86_64/vlz \
            release-artifacts/deb-package/*.deb \
            release-artifacts/rpm-package/**/*.rpm \
            release-artifacts/SHA256SUMS; do
            cosign sign-blob --yes \
              --output-signature "${file}.sig" \
              --output-certificate "${file}.pem" \
              "${file}"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0  # zizmor: ignore[superfluous-actions]
        with:
          generate_release_notes: false
          body_path: release-body.md
          files: |
            release-artifacts/vlz-linux-x86_64/vlz
            release-artifacts/vlz-linux-x86_64/vlz.sig
            release-artifacts/vlz-linux-x86_64/vlz.pem
            release-artifacts/deb-package/*.deb
            release-artifacts/deb-package/*.deb.sig
            release-artifacts/deb-package/*.deb.pem
            release-artifacts/rpm-package/**/*.rpm
            release-artifacts/rpm-package/**/*.rpm.sig
            release-artifacts/rpm-package/**/*.rpm.pem
            release-artifacts/SHA256SUMS
            release-artifacts/SHA256SUMS.sig
            release-artifacts/SHA256SUMS.pem

  trigger-obs:
    needs: [preflight-release, create-release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Verify OBS signing metadata
        run: |
          set -euo pipefail
          ./scripts/check-obs-signing.sh \
            --config packaging/obs/obs-project.env

      - name: Trigger OBS source-service refresh/build
        env:
          VERSION: ${{ needs.preflight-release.outputs.version }}
          OBS_TOKEN: ${{ secrets.OBS_TOKEN }}
        run: |
          set -euo pipefail
          ./scripts/obs-trigger-build.sh \
            --config packaging/obs/obs-project.env \
            --version "${VERSION}"
