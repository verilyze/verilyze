---
# Release workflow: builds packages and Docker image on version tags.
# Triggered by pushing a tag matching v*.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-binary:
    runs-on: ubuntu-latest
    # actions: write -- upload-artifact uses the Actions artifacts API.
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # Provision toolchain from rust-toolchain.toml (see zizmor superfluous-actions).
      - name: Install Rust (rust-toolchain.toml)
        run: |
          set -euo pipefail
          rustc -vV
          cargo -V

      - name: Build release binary
        run: cargo build --release --locked

      - name: Upload binary artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: vlz-linux-x86_64
          path: target/release/vlz

  build-deb:
    needs: build-binary
    runs-on: ubuntu-latest
    # actions: write -- upload-artifact uses the Actions artifacts API.
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust (rust-toolchain.toml)
        run: |
          set -euo pipefail
          rustc -vV
          cargo -V

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build .deb
        run: make deb

      - name: Upload .deb artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: deb-package
          path: target/debian/*.deb

  build-rpm:
    needs: build-binary
    runs-on: ubuntu-latest
    # actions: write -- upload-artifact uses the Actions artifacts API.
    permissions:
      contents: read
      actions: write
    container:
      image: fedora:45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install build tools
        run: dnf install -y rpm-build rust cargo openssl-devel git make

      - name: Build .rpm
        run: make rpm

      - name: Upload .rpm artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: rpm-package
          path: packaging/rpm/RPMS/**/*.rpm

  build-docker:
    runs-on: ubuntu-latest
    # packages: write for docker push to ghcr.io with GITHUB_TOKEN.
    permissions:
      contents: read
      actions: write
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        env:
          REPO: ${{ github.repository }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          docker build \
            -f packaging/docker/Dockerfile \
            -t "ghcr.io/${REPO}:${VERSION}" \
            -t "ghcr.io/${REPO}:latest" .

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image
        env:
          REPO: ${{ github.repository }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          docker push "ghcr.io/${REPO}:${VERSION}"
          docker push "ghcr.io/${REPO}:latest"

  create-release:
    needs: [build-binary, build-deb, build-rpm, build-docker]
    runs-on: ubuntu-latest
    # contents: write -- GitHub Release and asset upload; actions: read -- download-artifact.
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1  # zizmor: ignore[superfluous-actions]
        with:
          generate_release_notes: true
          files: |
            release-artifacts/vlz-linux-x86_64/vlz
            release-artifacts/deb-package/*.deb
            release-artifacts/rpm-package/**/*.rpm
