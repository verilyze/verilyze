# Default project license and copyright live in pyproject.toml [tool.vlz-headers].
# Annotation values below must stay in sync with that config.

version = 1

# Lock files: generated, not authored; assign via REUSE.toml instead of file headers
[[annotations]]
path = "Cargo.lock"
precedence = "override"
SPDX-FileCopyrightText = "The verilyze contributors"
SPDX-License-Identifier = "GPL-3.0-or-later"

# Generated config example (machine-generated; no SPDX in file)
[[annotations]]
path = "verilyze.conf.example"
precedence = "override"
SPDX-FileCopyrightText = "The verilyze contributors"
SPDX-License-Identifier = "GPL-3.0-or-later"

# Generated third-party license listing (cargo-about output; no SPDX in file)
[[annotations]]
path = "THIRD-PARTY-LICENSES"
precedence = "override"
SPDX-FileCopyrightText = "The verilyze contributors"
SPDX-License-Identifier = "GPL-3.0-or-later"

# ShellCheck config for completions/ (authored; SPDX in file)
[[annotations]]
path = "completions/.shellcheckrc"
precedence = "override"
SPDX-FileCopyrightText = "2026 Travis Post <post.travis@gmail.com>"
SPDX-License-Identifier = "GPL-3.0-or-later"

# Generated shell completions (clap_complete output; no SPDX in file)
[[annotations]]
path = "completions/*"
precedence = "override"
SPDX-FileCopyrightText = "The verilyze contributors"
SPDX-License-Identifier = "GPL-3.0-or-later"

# Config and data files
[[annotations]]
path = ".cursor/**"
precedence = "override"
SPDX-FileCopyrightText = "The verilyze contributors"
SPDX-License-Identifier = "GPL-3.0-or-later"

[[annotations]]
path = ".cursorignore"
precedence = "override"
SPDX-FileCopyrightText = "The verilyze contributors"
SPDX-License-Identifier = "GPL-3.0-or-later"

[[annotations]]
path = ".gitignore"
precedence = "override"
SPDX-FileCopyrightText = "The verilyze contributors"
SPDX-License-Identifier = "GPL-3.0-or-later"

[[annotations]]
path = ".dockerignore"
precedence = "override"
SPDX-FileCopyrightText = "The verilyze contributors"
SPDX-License-Identifier = "GPL-3.0-or-later"

[[annotations]]
path = "TODO.md"
precedence = "override"
SPDX-FileCopyrightText = "The verilyze contributors"
SPDX-License-Identifier = "GPL-3.0-or-later"

[[annotations]]
path = "tests/fuzz/corpus/**"
precedence = "override"
SPDX-FileCopyrightText = "The verilyze contributors"
SPDX-License-Identifier = "GPL-3.0-or-later"

# PEM test material for TLS CRL integration tests (SEC-021); not comments-friendly
[[annotations]]
path = "crates/core/vlz-cve-client/tests/fixtures/tls_crl/*.pem"
precedence = "override"
SPDX-FileCopyrightText = "The verilyze contributors"
SPDX-License-Identifier = "GPL-3.0-or-later"

[[annotations]]
path = "crates/core/vlz-cve-client/tests/fixtures/tls_crl/*.key"
precedence = "override"
SPDX-FileCopyrightText = "The verilyze contributors"
SPDX-License-Identifier = "GPL-3.0-or-later"

[[annotations]]
path = "crates/core/vlz-cve-client/tests/fixtures/tls_crl/*.crt"
precedence = "override"
SPDX-FileCopyrightText = "The verilyze contributors"
SPDX-License-Identifier = "GPL-3.0-or-later"

[[annotations]]
path = "deny.toml"
precedence = "override"
SPDX-FileCopyrightText = "The verilyze contributors"
SPDX-License-Identifier = "GPL-3.0-or-later"

# Biome formatter config (JSON; no SPDX in file)
[[annotations]]
path = "biome.json"
precedence = "override"
SPDX-FileCopyrightText = "The verilyze contributors"
SPDX-License-Identifier = "GPL-3.0-or-later"

# commitlint for super-linter (JSON; no SPDX in file)
[[annotations]]
path = ".commitlintrc.json"
precedence = "override"
SPDX-FileCopyrightText = "The verilyze contributors"
SPDX-License-Identifier = "GPL-3.0-or-later"

# Renovate config (JSON; no SPDX in file)
[[annotations]]
path = "renovate.json"
precedence = "override"
SPDX-FileCopyrightText = "The verilyze contributors"
SPDX-License-Identifier = "GPL-3.0-or-later"

# Handlebars template (SPDX in {{! }} comment; REUSE override for consistency)
[[annotations]]
path = "about.hbs"
precedence = "override"
SPDX-FileCopyrightText = "2026 Travis Post <post.travis@gmail.com>"
SPDX-License-Identifier = "GPL-3.0-or-later"

# Generated/cache files (pytest, coverage)
[[annotations]]
path = "**/__pycache__/**"
precedence = "override"
SPDX-FileCopyrightText = "The verilyze contributors"
SPDX-License-Identifier = "GPL-3.0-or-later"

[[annotations]]
path = ".coverage"
precedence = "override"
SPDX-FileCopyrightText = "The verilyze contributors"
SPDX-License-Identifier = "GPL-3.0-or-later"

# REUSE bootstrap virtualenv (created by scripts/ensure-reuse.sh when needed)
[[annotations]]
path = ".venv-reuse/**"
precedence = "override"
SPDX-FileCopyrightText = "The verilyze contributors"
SPDX-License-Identifier = "GPL-3.0-or-later"
