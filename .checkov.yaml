---
# Super-linter Checkov config (LINTER_RULES_PATH `.` in scripts/super-linter.sh).
# skip-path mirrors FILTER_REGEX_EXCLUDE and trivy.yaml scan.skip-dirs.

quiet: true

skip-path:
  - target
  - .git
  - completions
  - .mypy_cache
  - site-packages
  - super-linter-output
  - .venv
  - .venv-reuse
  - .venv-test
