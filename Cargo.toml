# ------------------------------------------------------------
# super‑duper – workspace root
# ------------------------------------------------------------
[workspace]
members = [
    "spd",                     # core binary
    "tests/fuzz",              # AFL fuzz targets (NFR-020); build with cargo afl build
    "spd-db",                  # trait definitions
    "spd-db-redb",             # default RedB backend (this crate)
    "spd-python",              # Python language plugin
    "spd-manifest-finder",
    "spd-manifest-parser",
    "spd-cve-client",
    "spd-cve-provider-nvd",    # NVD CVE provider (optional, nvd feature)
    "spd-report",
    "spd-integrity",
    "spd-plugin-macro"          # procedural macro for plugin registration
]
# Exclude fuzz crate from default build; it requires `cargo afl build` (AFL++).
default-members = ["spd", "spd-db", "spd-db-redb", "spd-python", "spd-manifest-finder",
    "spd-manifest-parser", "spd-cve-client", "spd-report", "spd-integrity",
    "spd-plugin-macro"]

# Enforce a single Rust edition for all members
resolver = "2"

# panic=unwind for dev: required by fuzz targets so thread panics are isolated (SEC-017).
# Non-root packages inherit workspace profile; fuzz script builds with profile.dev.
[profile.dev]
panic = "unwind"

# ----------------------------------------------------------------
# Shared workspace-wide metadata (optional but useful)
# ----------------------------------------------------------------
[workspace.package]
edition = "2024"
license = "GPL-3.0-or-later"
repository = "https://github.com/your-org/super-duper"
homepage = "https://github.com/your-org/super-duper"
authors = ["Your Name <you@example.com>"]
description = "Super‑Duper – fast, modular Software Composition Analysis tool"
keywords = ["sca", "supply‑chain", "rust", "cve", "sbom"]
categories = ["command-line-utilities", "development-tools"]
readme = "README.md"
